<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devin Admin — USDC Approvals</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030704;color:#eaffdf;font-family:'Courier New',monospace;min-height:100vh}
.shell{background:radial-gradient(circle at 20% 20%,rgba(57,255,20,.14),transparent 32rem),radial-gradient(circle at 80% 0%,rgba(57,255,20,.08),transparent 26rem),#030704;min-height:100vh;display:flex;flex-direction:column}
.card{border:1px solid #39ff14;background:linear-gradient(145deg,rgba(2,10,4,.96),rgba(3,28,10,.88));box-shadow:0 0 48px rgba(57,255,20,.16);max-width:1100px;width:100%;margin:20px auto;border-radius:24px;overflow:hidden}
nav{padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(57,255,20,.24);flex-wrap:wrap;gap:12px}
.logo{font-size:32px;font-weight:900;color:#39ff14;letter-spacing:-.06em;text-shadow:0 0 22px rgba(57,255,20,.8);cursor:pointer}
.content{padding:24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat{background:rgba(4,22,10,.92);border:1px solid rgba(57,255,20,.44);border-radius:12px;padding:16px}
.stat label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8ab986}
.stat .val{font-size:24px;font-weight:bold;color:#39ff14;margin-top:4px}
.stat .val.sm{font-size:14px;color:#eaffdf}
.btn{background:#39ff14;color:#001b06;border:1px solid #39ff14;padding:10px 20px;border-radius:12px;font-weight:bold;cursor:pointer;font-family:inherit;text-transform:uppercase;font-size:13px;box-shadow:0 0 18px rgba(57,255,20,.36)}
.btn:disabled{opacity:.5;cursor:not-allowed}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:12px 16px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8ab986;border-bottom:1px solid rgba(57,255,20,.24);position:sticky;top:0;background:rgba(4,22,10,.98)}
td{padding:12px 16px;border-top:1px solid rgba(57,255,20,.12)}
a{color:#39ff14;text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-height:500px;overflow-y:auto;background:rgba(4,22,10,.92);border:1px solid rgba(57,255,20,.44);border-radius:12px}
.loading{text-align:center;padding:48px;color:#8ab986}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #39ff14;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:rgba(255,92,124,.08);border:1px solid rgba(255,92,124,.3);border-radius:12px;padding:16px;margin-bottom:16px;color:#ff5c7c;font-size:13px}
.info{background:rgba(57,255,20,.04);border:1px solid rgba(57,255,20,.2);border-radius:12px;padding:16px;margin-top:24px;font-size:12px;color:#8ab986;line-height:1.8}
.info b{color:#39ff14}
.empty{text-align:center;padding:48px;color:#8ab986}
footer{text-align:center;padding:16px;font-size:12px;color:#6e7681;border-top:1px solid rgba(57,255,20,.2)}
</style>
</head>
<body>
<div class="shell">
<div class="card">
<nav>
<span class="logo">◆ devin admin</span>
<button class="btn" id="refreshBtn" onclick="loadData()">Refresh</button>
</nav>
<div class="content">
<div class="stats">
<div class="stat"><label>Total Approvals</label><div class="val" id="total">--</div></div>
<div class="stat"><label>Total USDC</label><div class="val" id="totalUSDC">--</div></div>
<div class="stat"><label>Current Block</label><div class="val sm" id="block">--</div></div>
<div class="stat"><label>Status</label><div class="val sm" id="status">Ready</div></div>
</div>
<div id="errorBox"></div>
<div class="wrap">
<table>
<thead><tr><th>#</th><th>Approver</th><th>Amount (USDC)</th><th>TX</th><th>Block</th></tr></thead>
<tbody id="tbody">
<tr><td colspan="5" class="empty">Click Refresh to load approvals</td></tr>
</tbody>
</table>
</div>
<div class="info">
<b>How it works:</b> Reads USDC Approval events directly from Base blockchain where spender = Executor contract.<br>
<a href="https://basescan.org/address/0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913" target="_blank">USDC on Basescan</a> ·
<a href="https://basescan.org/address/0x49e89C5B6a6E8Cb21Ea0d11eE0a21b7732f8e1A3" target="_blank">Executor on Basescan</a>
</div>
</div>
</div>
<footer>devin admin © 2025 — Base Network</footer>
</div>

<script>
const USDC='0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
const EXECUTOR='0x49e89C5B6a6E8Cb21Ea0d11eE0a21b7732f8e1A3'
const APROVAL_TOPIC='0x8c5be1e5ebec7d5bd14f71427d1e84f3dd0314c0f7b2291e5b200ac8c7c3b925'
const SPENDER_TOPIC='0x'+EXECUTOR.toLowerCase().slice(2).padStart(64,'0')

const RPCS=[
  'https://enterprise.onerpc.com/base?apikey=WYdgRKODxMQamrD3tutRnHZFpLBJYzEC',
  'https://mainnet.base.org',
  'https://base.llamarpc.com',
  'https://rpc.ankr.com/base'
]

function short(a){return a?a.slice(0,8)+'...'+a.slice(-4):'?'}
function hexNum(h){return parseInt(h,16)}
function fmtUSDC(h){
  const v=BigInt(h)
  return (v/1000000n).toLocaleString()+'.'+(v%1000000n).toString().padStart(6,'0')
}

async function rpc(method,params){
  for(const url of RPCS){
    try{
      const r=await fetch(url,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({jsonrpc:'2.0',method,params,id:1})
      })
      const d=await r.json()
      if(!d.error)return d.result
    }catch(e){}
  }
  throw new Error('All RPCs failed')
}

async function loadData(){
  const btn=document.getElementById('refreshBtn')
  const errBox=document.getElementById('errorBox')
  const tbody=document.getElementById('tbody')
  btn.disabled=true
  btn.textContent='Loading...'
  document.getElementById('status').textContent='Querying...'
  errBox.innerHTML=''

  try{
    const cur=hexNum(await rpc('eth_blockNumber',[]))
    document.getElementById('block').textContent=cur.toLocaleString()
    const start=Math.max(0,cur-86400)
    const all=[]

    for(let f=start;f<=cur;f+=10000){
      const t=Math.min(f+9999,cur)
      const logs=await rpc('eth_getLogs',[{
        fromBlock:'0x'+f.toString(16),
        toBlock:'0x'+t.toString(16),
        address:USDC.toLowerCase(),
        topics:[APROVAL_TOPIC,null,SPENDER_TOPIC]
      }])
      for(const l of(logs||[])){
        all.push({
          owner:'0x'+(l.topics[1]||'').slice(26),
          amount:l.data,
          amountFormatted:fmtUSDC(l.data),
          txHash:l.transactionHash,
          blockNumber:hexNum(l.blockNumber)
        })
      }
    }

    const seen=new Set()
    const unique=all.filter(e=>{
      if(seen.has(e.txHash))return false
      seen.add(e.txHash);return true
    }).sort((a,b)=>b.blockNumber-a.blockNumber)

    let total=0n
    for(const e of unique){try{total+=BigInt(e.amount)}catch{}}

    document.getElementById('total').textContent=unique.length
    document.getElementById('totalUSDC').textContent=fmtUSDC('0x'+total.toString(16))+' USDC'
    document.getElementById('status').textContent='✅ Done'

    if(unique.length===0){
      tbody.innerHTML='<tr><td colspan="5" class="empty">No approvals in the last 2 days</td></tr>'
    }else{
      tbody.innerHTML=unique.map((e,i)=>`
        <tr>
          <td style="color:#8ab986">${i+1}</td>
          <td><a href="https://basescan.org/address/${e.owner}" target="_blank">${short(e.owner)}</a></td>
          <td style="font-weight:bold;color:#39ff14">${e.amountFormatted}</td>
          <td><a href="https://basescan.org/tx/${e.txHash}" target="_blank" style="font-size:12px">${e.txHash.slice(0,10)}...${e.txHash.slice(-6)}</a></td>
          <td style="color:#8ab986">${e.blockNumber.toLocaleString()}</td>
        </tr>
      `).join('')
    }
  }catch(err){
    errBox.innerHTML='<div class="error">Error: '+err.message+'</div>'
    document.getElementById('status').textContent='❌ Error'
    tbody.innerHTML='<tr><td colspan="5" class="empty">Failed to load data</td></tr>'
  }

  btn.disabled=false
  btn.textContent='Refresh'
}

// Auto-load on page open
loadData()
</script>
</body>
</html>
